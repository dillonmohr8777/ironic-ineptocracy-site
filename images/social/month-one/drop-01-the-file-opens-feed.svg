  <text x="82" y="218" fill="#f2f0ea" font-family="Arial Black, Impact, sans-serif" font-size="88" font-weight="800" text-anchor="start"><tspan x="82" dy="0">THE FILE OPENS</tspan></text>
  
      <g transform="translate(230 330) rotate(-4 310 210)">
