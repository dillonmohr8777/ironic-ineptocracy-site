      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.16"/>
      </feComponentTransfer>
    </filter>
    <radialGradient id="redPool" cx="20%" cy="0%" r="82%">
      <stop offset="0" stop-color="#8f1712" stop-opacity="0.48"/>
      <stop offset="0.62" stop-color="#8f1712" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
