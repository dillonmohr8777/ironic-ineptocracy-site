    <pattern id="paperGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#352f25" stroke-opacity="0.36" stroke-width="1"/>
    </pattern>
    <filter id="grain">
